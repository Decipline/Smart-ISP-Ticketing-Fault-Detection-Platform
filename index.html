<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="description" content="Smart ISP Ticketing & Fault Detection Platform">
    <meta name="theme-color" content="#2563eb">
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
        img-src 'self' data: https:;
        font-src 'self' https://cdn.jsdelivr.net;
        connect-src 'self' https:;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    ">
    
    <title>Smart ISP Platform - Login</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="css/style.css" as="style">
    <link rel="preload" href="css/responsive.css" as="style">
    
    <!-- Stylesheets with integrity check -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css" media="screen and (max-width: 768px)">
    
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
</head>
<body>
    <!-- Main App Container -->
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loader"></div>
            <p>Secure Connection Established...</p>
        </div>
        
        <!-- Login Page (Default) -->
        <div id="login-container" class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h1>Smart ISP Platform</h1>
                    <p class="subtitle">Ticketing & Fault Detection System</p>
                </div>
                
                <form id="login-form" class="auth-form" autocomplete="off">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            required 
                            autocomplete="username"
                            pattern="[a-zA-Z0-9_]{3,20}"
                            title="Username must be 3-20 characters, letters, numbers, and underscores only"
                            aria-required="true"
                            aria-describedby="username-error"
                        >
                        <span id="username-error" class="error-message" role="alert"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                required 
                                autocomplete="current-password"
                                minlength="8"
                                aria-required="true"
                                aria-describedby="password-error"
                            >
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <span id="password-error" class="error-message" role="alert"></span>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="remember-me" name="remember-me">
                        <label for="remember-me">Remember me (secure device only)</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                        <span class="btn-text">Secure Login</span>
                        <span class="btn-loader" style="display: none;">
                            <svg class="spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32"/>
                            </svg>
                        </span>
                    </button>
                    
                    <div class="auth-footer">
                        <p>Forgot password? <a href="#" id="forgot-password">Reset securely</a></p>
                        <p class="security-note">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            End-to-end encrypted connection
                        </p>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Dashboard Container (Hidden by default) -->
        <div id="dashboard-container" style="display: none;">
            <!-- Navigation will be loaded here -->
        </div>
    </div>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Smart ISP">
    
    <!-- Critical JavaScript with defer for performance -->
    <script src="js/app.js" defer></script>
    
    <!-- Advanced Systems Scripts -->
    <script src="js/indexeddb.js" defer></script>
    <script src="js/compliance/accessibility.js" defer></script>
    <script src="js/compliance/gdpr.js" defer></script>
    <script src="js/compliance/audit-logging.js" defer></script>
    <script src="js/compliance/consent-manager.js" defer></script>
    <script src="js/automation/monitoring.js" defer></script>
    <script src="js/automation/auto-assignment.js" defer></script>
    <script src="js/automation/fault-detection.js" defer></script>
    <script src="js/performance/dashboard.js" defer></script>
    <script src="js/automation/reporting.js" defer></script>
    
    <!-- Service Worker Registration -->
    <script>
        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('SW registered:', registration);
                        
                        // Check for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // New version available
                                    if (confirm('New version available. Reload to update?')) {
                                        location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.error('SW registration failed:', error);
                    });
            });
        }
        
        // Clear any sensitive data from URL parameters
        if (window.location.search) {
            const cleanUrl = window.location.protocol + '//' + window.location.host + window.location.pathname;
            window.history.replaceState({}, document.title, cleanUrl);
        }
    </script>
</body>
</html>
